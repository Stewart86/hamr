# Release Workflow
#
# Before triggering a release, complete the manual steps in:
# docs/releases/checklist.md
#
# This workflow is triggered by:
# - Pushing a tag matching 'v*' (e.g., v0.1.0)
# - Manual dispatch with an explicit tag input

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      ref: ${{ steps.release.outputs.ref }}
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [ -z "$TAG" ]; then
            echo "::error::release tag is required"
            exit 1
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "::error::release tag must start with v"
              exit 1
              ;;
          esac

          VERSION="${TAG#v}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.ref }}

      - name: Verify Cargo.toml matches release tag
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          release_version = os.environ["RELEASE_VERSION"]
          cargo_version = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))["workspace"]["package"]["version"]
          if cargo_version != release_version:
              raise SystemExit(
                  f"Cargo.toml version {cargo_version} does not match release tag version {release_version}"
              )
          print(f"verified Cargo.toml version {cargo_version} matches tag")
          PY

  build-linux-x86_64:
    name: Build Linux x86_64
    needs: [prepare-release]
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            rust \
            gtk4 \
            gtk4-layer-shell \
            pkgconf

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.ref }}

      - name: Build release binaries
        run: cargo build --release --locked

      - name: Generate plugin checksums
        run: ./scripts/generate-plugin-checksums.sh

      - name: Create archive
        run: |
          mkdir -p dist/hamr-linux-x86_64
          cp target/release/hamr dist/hamr-linux-x86_64/
          cp target/release/hamr-daemon dist/hamr-linux-x86_64/
          cp target/release/hamr-gtk dist/hamr-linux-x86_64/
          cp target/release/hamr-tui dist/hamr-linux-x86_64/
          cp -r plugins dist/hamr-linux-x86_64/
          cp README.md LICENSE dist/hamr-linux-x86_64/ 2>/dev/null || true
          cd dist && tar -czvf hamr-linux-x86_64.tar.gz hamr-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hamr-linux-x86_64
          path: dist/hamr-linux-x86_64.tar.gz

  release:
    name: Create Release
    needs: [prepare-release, build-linux-x86_64]
    runs-on: ubuntu-latest
    steps:
      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: hamr-linux-x86_64
          path: dist

      - name: Create checksums
        working-directory: dist
        run: |
          sha256sum hamr-linux-x86_64.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
           tag_name: ${{ needs.prepare-release.outputs.tag }}
           name: Hamr ${{ needs.prepare-release.outputs.tag }}
           draft: false
           generate_release_notes: true
           files: |
             dist/hamr-linux-x86_64.tar.gz
             dist/checksums.txt

  update-aur:
    name: Update AUR Package
    needs: [prepare-release, build-linux-x86_64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.ref }}

      - name: Render AUR metadata from release version
        run: |
          python3 ./scripts/render-aur-metadata.py --version "${{ needs.prepare-release.outputs.version }}" --output-dir rendered-aur

      - name: Install SSH key for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat > ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Publish hamr to AUR
        id: publish_hamr
        continue-on-error: true
        run: |
          VERSION=${{ needs.prepare-release.outputs.version }}
          git clone ssh://aur@aur.archlinux.org/hamr.git aur-repo
          cd aur-repo
          # Ensure we're on master branch (AUR requirement)
          git checkout master 2>/dev/null || git checkout -b master
          git config user.email "siwei.wong@gmail.com"
          git config user.name "Stewart Wong"
          cp ../rendered-aur/hamr/PKGBUILD ../rendered-aur/hamr/.SRCINFO ../rendered-aur/hamr/hamr.install .
          git add PKGBUILD .SRCINFO hamr.install
          git diff --cached --quiet || git commit -m "Update to v$VERSION"
          git push origin master || echo "AUR push failed - may need manual intervention"

      - name: Publish hamr-bin to AUR
        id: publish_hamr_bin
        continue-on-error: true
        run: |
          VERSION=${{ needs.prepare-release.outputs.version }}
          git clone ssh://aur@aur.archlinux.org/hamr-bin.git aur-bin-repo || {
            # If clone fails, init new repo
            mkdir -p aur-bin-repo
            cd aur-bin-repo
            git init
            git remote add origin ssh://aur@aur.archlinux.org/hamr-bin.git
          }
          cd aur-bin-repo
          # Ensure we're on master branch (AUR requirement)
          git checkout master 2>/dev/null || git checkout -b master
          git config user.email "siwei.wong@gmail.com"
          git config user.name "Stewart Wong"
          cp ../rendered-aur/hamr-bin/PKGBUILD ../rendered-aur/hamr-bin/.SRCINFO ../rendered-aur/hamr-bin/hamr.install .
          git add PKGBUILD .SRCINFO hamr.install
          git diff --cached --quiet || git commit -m "Update to v$VERSION"
          git push -u origin master || echo "AUR hamr-bin push failed - may need manual intervention"

      - name: Summarize AUR publish status
        if: always()
        run: |
          echo "hamr publish step: ${{ steps.publish_hamr.outcome }}"
          echo "hamr-bin publish step: ${{ steps.publish_hamr_bin.outcome }}"
          if [ "${{ steps.publish_hamr.outcome }}" != "success" ] || [ "${{ steps.publish_hamr_bin.outcome }}" != "success" ]; then
            echo "::warning::One or more AUR publish steps failed. Check the job logs and publish manually if needed."
          fi
